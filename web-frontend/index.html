<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR PAYROLL - Hệ thống Quản lý Lương Nhân sự</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Header Section -->
        <div class="login-header">
            <div class="user-icon">👤</div>
            <h1 class="login-title">HR <span class="highlight">PAYROLL</span></h1>
            <p class="login-subtitle">Hệ thống quản lý nhân sự và tiền lương</p>
        </div>

        <!-- Login Form -->
        <div class="login-form-container">
            <form id="loginForm" class="login-form">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Nhập tên đăng nhập của bạn"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••"
                        required
                    >
                </div>

                <!-- Role -->
                <div class="form-group">
                    <label for="role">Vai trò thử cấp</label>
                    <select id="role" name="role" required>
                        <option value="admin">Admin</option>
                        <option value="ketoan">Kế toán</option>
                        <option value="nhanvien">Nhân viên</option>
                    </select>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-login">
                    Đăng nhập →
                </button>
            </form>

            <!-- Forgot Password Link -->
            <div class="login-footer">
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>
        </div>

        <!-- Copyright -->
        <div class="copyright">
            © 2023 HR PAYROLL SYSTEM. All Rights Reserved.
        </div>
    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thông báo</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modalMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>Đang đăng nhập...</p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
